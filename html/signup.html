<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="../css/signup.css">
</head>
<body>
    <div class="photo">
        <img src="../assets/smiling-young-business-woman-uses-a-tablet-pc-isolated-on-white-background-photo.jpg" alt="image">
    </div>
    <div class="form">
        <form action="">
            <h2>Sign Up</h2>
            <label for="fname">Full Name</label>
            <input type="text" name="fname" id="fname" placeholder="Name_">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Email Address_">
            <label for="">Username</label>
            <input type="text" name="username" id="username" placeholder="Username_">
            <label for="pass">Password</label>
            <input type="password" name="pass" id="pass" placeholder="Password_">
            <label for="pass2">Repeat Password</label>
            <input type="password" name="pass" id="pass2" placeholder="">
            <input type="checkbox" name="agree" id="agree" class="check">
            <label for="agree" class="check">Agree to the <a href="">Terms and Condition</a> </label>
            <input type="button" value="Sign Up">
            <a href="">sign up</a>
        </form>
    </div>
</body>
</html>
